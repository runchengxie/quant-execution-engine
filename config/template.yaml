# Execution engine configuration template
# Copy to config/config.yaml and adjust as needed.

broker:
  backend: null  # Set explicitly, e.g. longport, longport-paper, alpaca-paper
  default_account: main
  accounts:
    main: {}

execution:
  state_dir: outputs/state
  risk:
    max_qty_per_order: 0
    max_notional_per_order: 0
    max_spread_bps: 0
    max_participation_rate: 0
    max_market_impact_bps: 0
  kill_switch:
    env_var: QEXEC_KILL_SWITCH
    failure_threshold: 3

fees:
  domicile: HK
  commission: 0.0
  platform_per_share: 0.005
  fractional_pct_lt1: 0.012
  fractional_cap_lt1: 0.99
  sell_reg_fees_bps: 0.0

fractional_preview:
  enable: true
  default_step: 0.001

fx:
  to_usd:
    HKD: 0.128
