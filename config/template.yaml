# Backtest configuration template
# Copy this file to config.yaml and adjust as needed
# Note: config.yaml is not committed to version control

backtest:
  # Time range mode
  # fixed: use fixed start and end dates
  # dynamic: determine the time range from portfolio data
  period_mode: fixed
  
  # Backtest time range (only valid when period_mode: fixed)
  start: 2021-04-02  # Backtest start date (YYYY-MM-DD)
  end: 2025-07-02    # Backtest end date (YYYY-MM-DD)
  
  # Time buffer settings (only valid when period_mode: dynamic)
  # Adds an extra holding period after the last rebalance date
  buffer:
    months: 3  # Additional months
    days: 10   # Additional days
  
  # Initial capital configuration
  # Option 1: unified capital (recommended) - all strategies use the same initial cash
  initial_cash: 1000000  # Unified initial cash: USD 1,000,000
  
  # Option 2: per-strategy configuration (optional) - specify different capital per strategy
  # initial_cash:
  #   ai: 1000000      # AI stock picking strategy
  #   quant: 1000000   # Quantitative preliminary selection strategy
  #   spy: 1000000     # SPY benchmark strategy

risk_free:
  series: DGS3MO        # FRED series ID for risk-free rate (3-month T-bill)
  ttl_days: 5           # Refresh cache if older than this number of days (null to disable)
  fallback_rate: null   # Optional constant fallback when FRED API is unavailable (null to disable)
  calendar: US          # Trading calendar for alignment (reserved for future use)

report:
  report_mode: both       # comparison_only | strategy_only | both
  with_underwater: true   # Include drawdown subplot
  index_to_100: true      # Rebase equity curves to 100
  use_log_scale: false    # Plot equity curve using log scale
  show_rolling: true      # Enable rolling volatility/Sharpe panel
  rolling_window: 252     # Window (trading days) for rolling metrics
  show_heatmap: true      # Enable monthly return heatmap
  
# Broker fees and fractional preview (Phase 1)
fees:
  domicile: HK
  commission: 0.0
  platform_per_share: 0.005
  fractional_pct_lt1: 0.012
  fractional_cap_lt1: 0.99
  sell_reg_fees_bps: 0.0

fractional_preview:
  enable: true
  default_step: 0.001

selection:
  preliminary:
    factor_weights:
      cfo: 1.0
      ceq: 1.0
      txt: 1.0
      d_txt: 1.0
      d_at: -1.0
      d_rect: -1.0
  ai:
    prompt_version: v1
  
# Configuration notes:
# 1. Benefits of unified capital:
#    - Allows direct comparison of absolute return curves across strategies
#    - Simplifies configuration management
#    - Percentage metrics (return, annualized return, max drawdown) are independent of capital size
#
# 2. Importance of a unified time range:
#    - Ensures all strategies are compared within the same window
#    - Avoids the problem of measuring the same table with different rulers
#    - Improves comparability and credibility of backtest results
#
# 3. Usage recommendations:
#    - For production, use period_mode: fixed to ensure reproducibility
#    - For development/testing, period_mode: dynamic can automatically adapt to data range
