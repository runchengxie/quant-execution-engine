[pytest]
testpaths = tests
addopts = --cov=stock_analysis --cov-report=term-missing --cov-fail-under=75 -m "not integration and not e2e and not slow"
markers =
    unit: fast, isolated tests
    integration: tests that touch external APIs or DB
    e2e: end-to-end workflow tests
    slow: long-running tests
    requires_api: needs external API access
    requires_db: needs database access

filterwarnings =
    error::DeprecationWarning
    ignore:.*distutils.*:DeprecationWarning
