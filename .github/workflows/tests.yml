name: tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.10.11"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --group dev --extra cli
      - name: Run Ruff lint
        run: uv run ruff check .
      - name: Run Ruff format check
        run: uv run ruff format --check .
      - name: Run ty typecheck
        run: uv run ty check
      - name: Run pytest
        run: uv run pytest
      - name: Run BasedPyright advisory
        continue-on-error: true
        run: uv run python -m basedpyright
